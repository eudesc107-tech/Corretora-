<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Andreia Ferreira</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #2b2620;
      --taupe: #6b6255;
      --cream: #faf7f1;
      --white: #ffffff;
      --gold: #c9a961;
      --gold-deep: #a9822f;
      --gold-pale: #f3e9d4;
    }

    html, body {
      font-family: 'Poppins', sans-serif !important;
      background: var(--cream) !important;
    }

    /* Titulos e cabecalhos com a fonte elegante do site */
    h1, h2, h3, .Toastify__toast {
      font-family: 'Playfair Display', serif !important;
    }

    /* Tela de login */
    a[href*="auth"], button[type="submit"] {
      background: var(--gold-deep) !important;
      border-color: var(--gold-deep) !important;
      color: var(--white) !important;
      border-radius: 30px !important;
      font-weight: 500 !important;
    }

    a[href*="auth"]:hover, button[type="submit"]:hover {
      background: var(--gold) !important;
    }

    /* Campos de texto */
    input, textarea, select {
      border-color: var(--gold-pale) !important;
      border-radius: 10px !important;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 2px var(--gold-pale) !important;
    }

    /* Cabecalho fixo do painel apos login */
    header, [class*="TopBarContainer"] {
      background: var(--ink) !important;
    }

    /* Botoes principais de acao, como Publicar e Salvar */
    [class*="Button"][class*="primary"] {
      background: var(--gold-deep) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>

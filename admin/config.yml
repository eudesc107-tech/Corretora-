# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: eudesc107-tech/Corretora-
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/pkce
  auth_token_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://cool-pixie-e98421.netlify.app


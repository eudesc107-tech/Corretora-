<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Andreia Ferreira</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --ink: #2b2620;
      --cream: #faf7f1;
      --white: #ffffff;
      --gold: #c9a961;
      --gold-deep: #a9822f;
      --gold-pale: #f3e9d4;
    }
    html, body { font-family: 'Poppins', sans-serif !important; background: var(--cream) !important; }
    h1, h2, h3, .Toastify__toast { font-family: 'Playfair Display', serif !important; }
    a[href*="auth"], button[type="submit"] {
      background: var(--gold-deep) !important;
      border-color: var(--gold-deep) !important;
      color: var(--white) !important;
      border-radius: 30px !important;
      font-weight: 500 !important;
    }
    a[href*="auth"]:hover, button[type="submit"]:hover { background: var(--gold) !important; }
    input, textarea, select { border-color: var(--gold-pale) !important; border-radius: 10px !important; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 2px var(--gold-pale) !important;
    }
    header, [class*="TopBarContainer"] { background: var(--ink) !important; }
    [class*="Button"][class*="primary"] { background: var(--gold-deep) !important; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: eudesc107-tech/Corretora-
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/pkce
  auth_token_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo:
  src: https://i.imgur.com/bJDsHmC.jpeg
  show_in_header: true
site_url: https://cool-pixie-e98421.netlify.app

# Deixa o painel inteiro em português
locale: "pt"

media_folder: "images/imoveis"
public_folder: "/images/imoveis"

collections:
  - name: "imoveis"
    label: "Imóveis"
    description: "Adicione, edite ou desative os imóveis que aparecem no site. As mudanças ficam publicadas no site em menos de um minuto depois de clicar em Salvar."
    files:
      - name: "lista"
        label: "Lista de Imóveis"
        file: "content/imoveis.json"
        fields:
          - label: "Imóveis"
            name: "imoveis"
            widget: "list"
            summary: "{{titulo}} — {{bairro}}"
            fields:
              - label: "Título do imóvel"
                name: "titulo"
                widget: "string"
                hint: "Exemplo: Casa em Condomínio Fechado"

              - label: "Tipo"
                name: "tipo"
                widget: "select"
                options: ["Casa", "Apartamento", "Terreno"]

              - label: "Situação"
                name: "status"
                widget: "select"
                options: ["Venda", "Aluguel"]

              - label: "Foto principal"
                name: "imagem"
                widget: "image"
                hint: "Escolha uma foto do imóvel. Formato PNG."

              - label: "Preço"
                name: "preco"
                widget: "number"
                value_type: "float"
                hint: "Digite somente números, sem ponto e sem vírgula. Exemplo: 650000"

              - { label: "Quartos", name: "quartos", widget: "number", required: false }
              - { label: "Banheiros", name: "banheiros", widget: "number", required: false }
              - { label: "Vagas de garagem", name: "vagas", widget: "number", required: false }
              - { label: "Área em m2", name: "area", widget: "number", required: false }

              - label: "Bairro"
                name: "bairro"
                widget: "string"

              - label: "Cidade"
                name: "cidade"
                widget: "string"

              - label: "Descrição"
                name: "descricao"
                widget: "text"
                required: false
                hint: "Um texto curto contando os pontos fortes do imóvel."

              - label: "Imóvel ativo no site"
                name: "ativo"
                widget: "boolean"
                default: true
                hint: "Desative para esconder o imóvel do site sem precisar apagar."

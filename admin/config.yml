# Usar autenticação PKCE do DecapBridge (obrigatório)
backend:
  nome: git-gateway
  repositório: eudesc107-tech/Corretora-
  ramo: principal
  tipo_de_autenticação: pkce
  URL base: https://auth.decapbridge.com
  auth_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/pkce
  auth_token_endpoint: /sites/40e4e7be-4af8-4849-a8a1-1f1708655ba8/token
  gateway_url: https://gateway.decapbridge.com

  mensagens_de_commit:
    criar: Criar {{coleção}} "{{slug}}" - {{nome-do-autor}} <{{login-do-autor}}>
    atualização: Atualizar {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    excluir: Excluir {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>
    uploadMedia: Enviar "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Excluir "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Mensagem {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

aut:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logotipo:
  Fonte: https://i.imgur.com/bJDsHmC.jpeg
  mostrar_no_cabeçalho: verdadeiro
URL do site: https://cool-pixie-e98421.netlify.app

# Deixa o painel inteiro em português (tradução automática)
local: "pt"

media_folder: "imagens/imoveis"
public_folder: "/images/imoveis"

coleções:
  - nome: "imoveis"
    rótulo: "Im\u00f3veis"
    description: "Adicione, edite ou desative os im\u00f3veis que aparecem no site. As mudan\u00e7as ficam publicadas no site em menos de um minuto depois de clicar em Salvar."
    arquivos:
      - nome: "lista"
        label: "Lista de Imóveis"
        Arquivo: "content/imoveis.json"
        campos:
          - rótulo: "Im\u00f3veis"
            nome: "imoveis"
            widget: "lista"
            resumo: "{{título}} \u2014 {{bairro}}"
            campos:
              - rótulo: "T\u00edtulo do im\u00f3vel"
                nome: "título"
                widget: "string"
                dica: "Exemplo: Casa em Condomínio\u000ednio Fechado"

              - etiqueta: "Tipo"
                nome: "tipo"
                widget: "selecionar"
                opções: ["Casa", "Apartamento", "Terreno"]

              - rótulo: "Situa\u00e7\u00e3o"
                nome: "status"
                widget: "selecionar"
                opções: ["Venda", "Aluguel"]

              - etiqueta: "Foto principal"
                nome: "imagem"
                widget: "imagem"
                dica: "Escolha uma foto do im\u00f3vel. Formato PNG."

              - rótulo: "Pré-série"
                nome: "preco"
                widget: "número"
                tipo_de_valor: "float"
                dica: "Digite somente n\u00fameros, sem ponto e sem v\u000edrgula. Exemplo: 650000"

              - { label: "Quartos", nome: "quartos", widget: "número", obrigatório: falso }
              - { label: "Banheiros", nome: "banheiros", widget: "número", obrigatório: falso }
              - { label: "Vagas de garagem", nome: "vagas", widget: "número", obrigatório: falso }
              - { label: "\u00c1rea em m2", name: "area", widget: "number", required: false }

              - rótulo: "Bairro"
                nome: "bairro"
                widget: "string"

              - rótulo: "Cidade"
                nome: "ele"
                widget: "string"

              - rótulo: "Descrição\u00e7\u00e3o"
                nome: "descricao"
                widget: "texto"
                obrigatório: falso
                dica: "Um texto curto contando os pontos fortes do imvel."

              - label: "Im\u00f3vel ativo no site"
                nome: "ativo"
                widget: "booleano"
                padrão: verdadeiro
                dica: "Desative para esconder o im\u00f3vel do site sem precisar apagar."
